name: New Seanime release

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  TARGET_REPO: 5rahim/seanime

jobs:
  check-release-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Get latest release from external repo
        id: latest_release
        run: |
          RELEASE_JSON=$(curl -s https://api.github.com/repos/${TARGET_REPO}/releases/latest)
          TAG=$(echo "$RELEASE_JSON" | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Restore last release cache
        id: cache-last
        uses: actions/cache@v4
        with:
          path: .last_release
          key: last-release-cache-${{ env.TARGET_REPO }}

      - name: Read last processed release
        id: last_release
        run: |
          if [ -f .last_release ]; then
            LAST=$(cat .last_release)
          else
            LAST="none"
          fi
          echo "last=$LAST" >> $GITHUB_OUTPUT

      - name: Decide if build is needed
        id: should_build
        run: |
          if [ "${{ steps.latest_release.outputs.tag }}" != "${{ steps.last_release.outputs.last }}" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: steps.should_build.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        id: repo_lower
        run: |
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        if: steps.should_build.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            SEANIME_VERSION=${{ steps.latest_release.outputs.tag }}
          tags: |
            ghcr.io/${{ steps.repo_lower.outputs.repo }}:${{ steps.latest_release.outputs.tag }}
            ghcr.io/${{ steps.repo_lower.outputs.repo }}:latest

      - name: Save last processed release
        if: steps.should_build.outputs.build == 'true'
        run: |
          echo "${{ steps.latest_release.outputs.tag }}" > .last_release

      - name: Update cache
        if: steps.should_build.outputs.build == 'true'
        uses: actions/cache@v4
        with:
          path: .last_release
          key: last-release-cache-${{ env.TARGET_REPO }}
