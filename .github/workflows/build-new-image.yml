name: New Seanime release

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

env:
  TARGET_REPO: 5rahim/seanime

jobs:
  check-release-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Get latest release from external repo
        id: latest_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view \
            --repo $TARGET_REPO \
            --json tagName \
            -q .tagName)
      
          if [ -z "$TAG" ]; then
            echo "No release found"
            exit 1
          fi
      
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Read last built version
        id: last_release
        run: |
          LAST=$(cat .last_seanime_version 2>/dev/null || echo "none")
          echo "Last built: $LAST"
          echo "last=$LAST" >> $GITHUB_OUTPUT

      - name: Decide if build is needed
        id: should_build
        run: |
          if [ "${{ steps.latest_release.outputs.tag }}" != "${{ steps.last_release.outputs.last }}" ]; then
            echo "New version detected"
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "Already built"
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: steps.should_build.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        if: steps.should_build.outputs.build == 'true'
        id: repo_lower
        run: |
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        if: steps.should_build.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            SEANIME_VERSION=${{ steps.latest_release.outputs.tag }}
          tags: |
            ghcr.io/${{ steps.repo_lower.outputs.repo }}:${{ steps.latest_release.outputs.tag }}
            ghcr.io/${{ steps.repo_lower.outputs.repo }}:latest

      - name: Update stored release version
        if: steps.should_build.outputs.build == 'true'
        run: |
          echo "${{ steps.latest_release.outputs.tag }}" > .last_seanime_version
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .last_seanime_version
          git commit -m "chore: update last built version to ${{ steps.latest_release.outputs.tag }}"
          git push
